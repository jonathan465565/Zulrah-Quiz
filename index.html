<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSRS Zulrah Memory Trainer v4.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --txt-main: #ffffff;
            --txt-muted: #b0b0b0;
            --accent: #ffb74d; 
            --color-range: #43a047; 
            --color-mage: #1e88e5; 
            --color-melee: #e53935; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--txt-main);
            margin: 0;
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; 
        }

        button { 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            user-select: none; 
        }
        button:active { opacity: 0.7; transform: scale(0.98); }

        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        h1 { color: var(--accent); font-size: 28px; margin-bottom: 30px; }

        .rotation-buttons {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 320px;
            gap: 15px;
        }

        .rot-btn {
            background-color: var(--bg-panel);
            color: var(--txt-main);
            padding: 20px;
            border-radius: 12px;
            font-weight: bold;
            text-align: left;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.1s;
        }
        
        @media (hover: hover) {
            .rot-btn:hover { border-color: var(--accent); }
        }

        .btn-key { margin-top: 40px; background-color: var(--bg-dark); color: var(--txt-muted); text-decoration: underline; border: none; font-size: 14px; }

        #quiz-view {
            display: none; 
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-panel);
        }

        #quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            color: var(--txt-main);
        }
        #quiz-header .back-btn { background: none; color: var(--txt-main); font-size: 20px; padding: 10px; }
        #quiz-header .rot-name { font-weight: bold; }
        #quiz-header .step-count { font-weight: lighter; font-size: 14px; opacity: 0.8; }

        #card-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            cursor: pointer; 
        }

        /* --- ACCURATE ISLAND MAP --- */
        #map-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            height: 250px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
            overflow: hidden;
            background-color: #1a241e; /* Swamp Water */
        }
        
        #map-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* The 2 accurate pillars */
        .pillar {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #222;
            background-color: #7a7a7a; 
            z-index: 3;
            transform: translate(-50%, -50%); 
        }
        
        /* Accurately placed on the U-bends */
        #p-nw { top: 25%; left: 30%; }
        #p-ne { top: 25%; left: 70%; }

        .map-icon {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%); 
        }

        #zulrah-pos {
            width: 36px;
            height: 36px;
            border: 3px solid transparent;
            font-size: 20px;
            color: #fff;
            z-index: 4; 
        }

        #player-pos {
            width: 24px; 
            height: 24px;
            background-color: rgba(255, 183, 77, 0.2);
            border: 2px dashed var(--accent);
            font-size: 12px;
            color: var(--accent);
            z-index: 5; 
        }

        #info-panel {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            border: 2px solid transparent;
            padding: 20px;
            text-align: center;
            transition: border-color 0.3s;
        }

        #info-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        #info-icon { font-size: 32px; }
        #info-title { font-weight: bold; font-size: 20px; }

        .attacks-count { color: var(--txt-muted); font-size: 14px; margin-top: 5px; }
        .hint-text { color: var(--txt-muted); font-size: 12px; margin-top: 20px; opacity: 0.7; }

        #key-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 10;
            padding: 20px;
            overflow-y: auto;
        }
        #key-modal .close-btn { position: absolute; top: 15px; right: 20px; background: none; color: var(--txt-main); font-size: 20px; padding: 10px; }
        .key-content { color: var(--txt-muted); text-align: left; max-width: 320px; margin: 40px auto; }
        .key-content h2 { color: var(--txt-main); margin-bottom: 20px; }
        .key-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 14px; }
        .key-marker { width: 14px; height: 14px; border-radius: 50%; }

    </style>
</head>
<body>

    <div id="main-menu">
        <h1>Zulrah Trainer v4.0</h1>
        <div class="rotation-buttons">
            <button class="rot-btn" onclick="startRotation('MAGMA A')">1. MAGMA A (Melee)</button>
            <button class="rot-btn" onclick="startRotation('MAGMA B')">2. MAGMA B (Melee)</button>
            <button class="rot-btn" onclick="startRotation('SERP')">3. SERP (Range)</button>
            <button class="rot-btn" onclick="startRotation('TANZ')">4. TANZ (Mage)</button>
        </div> 
        <button class="btn-key" onclick="toggleKey()">View Key & Legend</button>
    </div>

    <div id="quiz-view">
        <div id="quiz-header">
            <button class="back-btn" onclick="showMainMenu()"><i class="fas fa-chevron-left"></i></button>
            <div class="header-center">
                <span class="rot-name">Rotation Name</span><br>
                <span class="step-count">Step 1/11</span>
            </div>
            <div style="width: 40px;">&nbsp;</div> 
        </div>

        <div id="card-body" onclick="nextStep()">
            
            <div id="map-container">
                <svg id="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M 20,100 Q 20,20 50,20 Q 80,20 80,100" fill="none" stroke="#4a4235" stroke-width="26" stroke-linecap="round" />
                    <path d="M 20,100 Q 20,20 50,20 Q 80,20 80,100" fill="none" stroke="#5c5243" stroke-width="22" stroke-linecap="round" />
                </svg>

                <div class="pillar" id="p-nw"></div> 
                <div class="pillar" id="p-ne"></div>

                <div class="map-icon" id="player-pos"><i class="fas fa-running"></i></div>
                <div class="map-icon" id="zulrah-pos"><i class="fas fa-dragon"></i></div>
            </div>

            <div id="info-panel">
                <div id="info-header">
                    <span id="info-icon"><i class="fas fa-magic"></i></span>
                    <span id="info-title">Mage Form</span>
                </div>
                <p id="info-text">Pray Mage, Run East.</p>
                <p class="attacks-count"><i class="fas fa-bolt"></i> <span id="attacks-num">0</span> Attacks</p>
                <p class="hint-text">(Tap anywhere on card to advance)</p>
            </div>
        </div>
    </div>

    <div id="key-modal">
        <button class="close-btn" onclick="toggleKey()"><i class="fas fa-times"></i></button>
        <div class="key-content">
            <h2>Legend</h2>
            <div class="key-item"><div class="key-marker" style="background-color: var(--color-range);"></div> Range form</div>
            <div class="key-item"><div class="key-marker" style="background-color: var(--color-mage);"></div> Mage form</div>
            <div class="key-item"><div class="key-marker" style="background-color: var(--color-melee);"></div> Melee form</div>
            <div class="key-item"><div class="key-marker" style="background-color: transparent; border: 2px dashed var(--accent);"></div> Player safe spot</div>
            <div class="key-item"><div class="pillar" style="position:static; transform:none;"></div> Island Pillars (Only 2!)</div>
        </div>
    </div>

    <script>
        // STRICTLY matching the visual diagram provided for Player and Zulrah placements
        const rotations = {
            'MAGMA A': [
                { form: 'range', pos: 'C', playerPos: 'NE', attacks: 0, text: 'Initial spawn. Stand by NE Pillar.' },
                { form: 'melee', pos: 'C', playerPos: 'NW', attacks: 2, text: 'No prayer. Run across to NW Pillar after attacks start.' },
                { form: 'mage', pos: 'C', playerPos: 'NW', attacks: 4, text: 'Pray Mage. Stay by NW pillar.' },
                { form: 'range', pos: 'S', playerPos: 'W-Mid', attacks: 5, text: 'Pray Range. Move down left side.' },
                { form: 'melee', pos: 'C', playerPos: 'W-Mid', attacks: 2, text: 'Stay left side.' },
                { form: 'mage', pos: 'W', playerPos: 'E-Mid', attacks: 5, text: 'Pray Mage, Run all the way to East side.' },
                { form: 'range', pos: 'S', playerPos: 'E-Mid', attacks: 0, text: 'Safe spot on East side, no prayer.' },
                { form: 'mage', pos: 'S', playerPos: 'E-Mid', attacks: 5, text: 'Pray Mage. Stay East side.' },
                { form: 'jad', type: 'jad', pos: 'W', playerPos: 'E-Mid', attacks: 10, text: 'JAD PHASE! Alternate Range > Mage.' },
                { form: 'melee', pos: 'C', playerPos: 'NW', attacks: 2, text: 'Run to NW Pillar.' },
                { form: 'range', type: 'reset', pos: 'C', playerPos: 'NE', attacks: 5, text: 'Pray Range. Run back to start (NE).' }
            ],
            'MAGMA B': [
                { form: 'range', pos: 'C', playerPos: 'NE', attacks: 0, text: 'Initial spawn.' },
                { form: 'melee', pos: 'C', playerPos: 'NW', attacks: 2, text: 'Run across to NW Pillar after attacks start.' },
                { form: 'mage', pos: 'C', playerPos: 'NW', attacks: 4, text: 'Pray Mage. Stay by NW pillar.' },
                { form: 'mage', pos: 'W', playerPos: 'W-Mid', attacks: 5, text: 'Pray Mage. Move slightly down West arm.' },
                { form: 'melee', pos: 'C', playerPos: 'E-Mid', attacks: 2, text: 'Run all the way to East side.' },
                { form: 'range', pos: 'E', playerPos: 'W-Mid', attacks: 5, text: 'Pray Range. Run back to West side.' },
                { form: 'range', pos: 'S', playerPos: 'W-Mid', attacks: 0, text: 'Safe spot on West side.' },
                { form: 'mage', pos: 'S', playerPos: 'W-Mid', attacks: 5, text: 'Pray Mage, stay West.' },
                { form: 'jad', type: 'jad', pos: 'E', playerPos: 'W-Mid', attacks: 10, text: 'JAD PHASE! Alternate Range > Mage.' },
                { form: 'melee', pos: 'C', playerPos: 'NW', attacks: 2, text: 'Run up to NW Pillar.' },
                { form: 'range', type: 'reset', pos: 'C', playerPos: 'NE', attacks: 5, text: 'Pray Range. Run back to start (NE).' }
            ],
            'SERP': [
                { form: 'range', pos: 'C', playerPos: 'NE', attacks: 0, text: 'Initial spawn.' },
                { form: 'range', pos: 'E', playerPos: 'NE', attacks: 5, text: 'Pray Range. Stay near NE Pillar.' },
                { form: 'melee', pos: 'C', playerPos: 'NW', attacks: 2, text: 'Run across to NW Pillar after attack starts!' },
                { form: 'range', pos: 'W', playerPos: 'NW', attacks: 5, text: 'Pray Range. Stay near NW Pillar.' },
                { form: 'mage', pos: 'S', playerPos: 'E-Mid', attacks: 5, text: 'Pray Mage. Run down East side.' },
                { form: 'mage', pos: 'E', playerPos: 'W-Mid', attacks: 5, text: 'Pray Mage. Run across to West side.' },
                { form: 'range', pos: 'S', playerPos: 'W-Mid', attacks: 0, text: 'Safe spot on West side.' },
                { form: 'mage', pos: 'C', playerPos: 'W-Mid', attacks: 5, text: 'Pray Mage. Stay West side.' },
                { form: 'range', pos: 'W', playerPos: 'E-Mid', attacks: 5, text: 'Pray Range. Run across to East side.' },
                { form: 'jad', type: 'jad', pos: 'W', playerPos: 'E-Mid', attacks: 10, text: 'JAD PHASE! Alternate Mage > Range.' },
                { form: 'range', type: 'reset', pos: 'S', playerPos: 'E-Bot', attacks: 0, text: 'Pray Range. Stay East side.' },
                { form: 'range', type: 'reset', pos: 'C', playerPos: 'NE', attacks: 5, text: 'Back to start (NE).' }
            ],
            'TANZ': [
                { form: 'range', pos: 'C', playerPos: 'NE', attacks: 0, text: 'Initial spawn.' },
                { form: 'mage', pos: 'E', playerPos: 'NE', attacks: 6, text: 'Pray Mage. Stay NE.' },
                { form: 'range', pos: 'C', playerPos: 'E-Mid', attacks: 4, text: 'Pray Range. Move down East arm.' },
                { form: 'mage', pos: 'W', playerPos: 'W-Mid', attacks: 4, text: 'Pray Mage. Run across to West side.' },
                { form: 'range', pos: 'S', playerPos: 'W-Mid', attacks: 0, text: 'Safe spot on West side.' },
                { form: 'mage', pos: 'W', playerPos: 'W-Mid', attacks: 4, text: 'Pray Mage. Stay West.' },
                { form: 'range', pos: 'S', playerPos: 'E-Mid', attacks: 0, text: 'Safe spot, Run to East side.' },
                { form: 'range', pos: 'C', playerPos: 'E-Mid', attacks: 5, text: 'Pray Range. Stay East.' },
                { form: 'range', pos: 'E', playerPos: 'W-Mid', attacks: 5, text: 'Pray Range. Run across to West side.' },
                { form: 'mage', pos: 'S', playerPos: 'W-Mid', attacks: 4, text: 'Pray Mage. Stay West.' },
                { form: 'jad', type: 'jad', pos: 'E', playerPos: 'W-Mid', attacks: 8, text: 'JAD PHASE! Alternate Range > Mage.' },
                { form: 'mage', type: 'reset', pos: 'C', playerPos: 'NW', attacks: 0, text: 'Pray Mage. Run up to NW Pillar.' },
                { form: 'range', type: 'reset', pos: 'C', playerPos: 'NE', attacks: 5, text: 'Back to start next.' }
            ]
        };

        let currentRotationName = null;
        let currentStepIndex = 0;

        const mainMenuView = document.getElementById('main-menu');
        const quizView = document.getElementById('quiz-view');
        const keyModal = document.getElementById('key-modal');
        const headerName = document.querySelector('.rot-name');
        const headerStep = document.querySelector('.step-count');
        const zulrahPosMarker = document.getElementById('zulrah-pos');
        const playerPosMarker = document.getElementById('player-pos');
        const infoPanel = document.getElementById('info-panel');
        const infoIcon = document.getElementById('info-icon');
        const infoTitle = document.getElementById('info-title');
        const infoText = document.getElementById('info-text');
        const attacksNum = document.getElementById('attacks-num');

        // Accurately placed around the "U" shape
        const zulrahPositions = {
            'C': ['45%', '50%'], // Inside the curve
            'S': ['90%', '50%'], // Bottom middle
            'W': ['50%', '5%'],  // Outside Left
            'E': ['50%', '95%']  // Outside Right
        };

        // Accurately matched to the yellow highlighted boxes in image 1
        const playerPositions = {
            'NE': ['30%', '68%'], 
            'NW': ['30%', '32%'], 
            'E-Mid': ['55%', '82%'],
            'W-Mid': ['55%', '18%'],
            'E-Bot': ['85%', '80%']
        };

        const formIcons = {
            'range': '<i class="fas fa-bullseye" style="color: var(--color-range);"></i>',
            'mage': '<i class="fas fa-magic" style="color: var(--color-mage);"></i>',
            'melee': '<i class="fas fa-gavel" style="color: var(--color-melee);"></i>',
            'jad': '<i class="fas fa-skull" style="color: #ffb300;"></i>'
        };

        function showMainMenu() {
            quizView.style.display = 'none';
            mainMenuView.style.display = 'flex';
            currentRotationName = null;
        }

        function startRotation(name) {
            currentRotationName = name;
            currentStepIndex = 0;
            mainMenuView.style.display = 'none';
            quizView.style.display = 'flex';
            populateCard();
        }

        function populateCard() {
            const dataArr = rotations[currentRotationName];
            const currentStep = dataArr[currentStepIndex];

            headerName.innerText = currentRotationName;
            headerStep.innerText = `Step ${currentStepIndex + 1}/${dataArr.length}`;

            const zCoord = zulrahPositions[currentStep.pos];
            if (zCoord) {
                zulrahPosMarker.style.top = zCoord[0];
                zulrahPosMarker.style.left = zCoord[1];
            }

            const pCoord = playerPositions[currentStep.playerPos];
            if (pCoord) {
                playerPosMarker.style.top = pCoord[0];
                playerPosMarker.style.left = pCoord[1];
            }

            attacksNum.innerText = currentStep.attacks;
            infoText.innerText = currentStep.text;

            let currentFormKey = currentStep.form;
            let currentTitle = currentStep.form.charAt(0).toUpperCase() + currentStep.form.slice(1) + ' Form';
            let currentAccentColor = `var(--color-${currentStep.form})`;

            if (currentStep.type === 'jad') {
                currentFormKey = 'jad';
                currentTitle = 'JAD PHASE!';
                currentAccentColor = '#ffb300';
            }

            if (currentStep.form === 'range' && currentStep.type === 'reset') {
                 currentAccentColor = '#fff'; 
            }

            infoIcon.innerHTML = formIcons[currentFormKey];
            infoTitle.innerText = currentTitle;
            zulrahPosMarker.style.borderColor = currentAccentColor;
            infoPanel.style.borderColor = currentAccentColor;
        }

        function nextStep() {
            currentStepIndex++;
            if (currentStepIndex >= rotations[currentRotationName].length) {
                currentStepIndex = 0; 
            }
            populateCard();
        }

        function toggleKey() {
            keyModal.style.display = keyModal.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
